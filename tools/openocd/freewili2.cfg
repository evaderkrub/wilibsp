# tools/openocd/freewili2.cfg — OpenOCD config for the FreeWili2 (RP2350B) over
# the Raspberry Pi Debug Probe (CMSIS-DAP / SWD). Used by `fw flash` and `fw rtt`.
#
# The interface/target includes below use `[find ...]`, which resolves against
# OpenOCD's script search path. The `fw` CLI passes `-s <pico-sdk openocd
# scripts dir>` automatically; if you invoke openocd by hand, add that -s too.
source [find interface/cmsis-dap.cfg]
cmsis-dap usb interface 0
adapter speed 5000
source [find target/rp2350.cfg]
